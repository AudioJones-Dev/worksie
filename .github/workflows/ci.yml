name: CI

on:
  pull_request:
    paths:
      - 'Worksie/**'
      - '.github/workflows/ci.yml'
  push:
    branches: [main]
    paths:
      - 'Worksie/**'
      - '.github/workflows/ci.yml'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Lint & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Worksie
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Worksie/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
